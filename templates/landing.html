<!DOCTYPE html>
<html>
<head>
    <title>Upload Excel File</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-lg">
    <h1 class="text-2xl font-bold text-slate-800 mb-4">
        Upload Cause & Effect Excel
    </h1>

    <p class="text-slate-600 mb-6">
        Upload the Excel (.xlsx) file to continue.
    </p>

    {% if error %}
    <div class="bg-red-100 text-red-700 p-3 rounded mb-4">
        {{ error }}
    </div>
    {% endif %}

    <form action="/" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".xlsx"
               class="w-full border border-slate-300 rounded p-2 mb-4">

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded">
            Upload & Continue
        </button>
    </form>
</div>

</body>
</html>
