<script>
// ===============================
// Marker Styling
// ===============================
function getMarkerClass(marker, sheetName) {
    if (!marker) return "marker";

    marker = marker.toUpperCase().trim();
    sheetName = (sheetName || "").toUpperCase().trim();

    if (sheetName === "ELY SYSTEM - SIS") {
        if (marker.endsWith("*")) return "marker marker-sis-light";
        return "marker marker-sis-dark";
    }

    if (sheetName === "ELY SYSTEM - OPERATIONAL") {
        if (marker === "S") return "marker marker-op-dark";
        if (marker === "N" || marker === "NP") return "marker marker-op-light";
        return "marker marker-op-light";
    }

    return "marker marker-default";
}

// ===============================
// Group Effects by Description
// ===============================
function groupEffectsByDescription(effects) {
    let grouped = {};

    effects.forEach(effect => {
        let key = effect.effect_desc || effect.effect_id || "UNKNOWN EFFECT";
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(effect);
    });

    return grouped;
}

// ===============================
// Render Effects Table (Row Based)
// ===============================
function renderEffectsMasterTable(effects, sheetName) {
    if (!effects || effects.length === 0) {
        return `<p class="text-sm italic text-slate-600 bg-slate-100 p-3 rounded-lg border border-slate-300 mt-3">
                    No triggered effects found.
                </p>`;
    }

    let grouped = groupEffectsByDescription(effects);

    let html = `
        <div class="overflow-x-auto mt-4 rounded-2xl shadow-md border border-slate-200">
            <table class="w-full border-collapse bg-white rounded-2xl overflow-hidden text-sm">
                <thead class="bg-gradient-to-r from-blue-700 to-purple-700 text-white">
                    <tr>
                        <th class="p-4 text-left w-[35%]">Effect Description</th>
                        <th class="p-4 text-left w-[65%]">Output Tag / Action / Marker</th>
                    </tr>
                </thead>
                <tbody>
    `;

    for (let effectHeader in grouped) {

        html += `
            <tr class="border border-slate-200">
                <td class="bg-slate-50 p-4 font-extrabold text-slate-900 align-top">
                    ${effectHeader}
                </td>
                <td class="p-4">
                    <table class="w-full border-collapse text-xs bg-white rounded-xl overflow-hidden border border-slate-200">
                        <thead class="bg-slate-900 text-white">
                            <tr>
                                <th class="p-3 border border-slate-200 text-left">Output Tag</th>
                                <th class="p-3 border border-slate-200 text-left">Action</th>
                                <th class="p-3 border border-slate-200 text-left w-[120px]">Marker</th>
                            </tr>
                        </thead>
                        <tbody>
        `;

        grouped[effectHeader].forEach(effect => {
            let markerValue = effect.marker || "-";
            let markerClass = getMarkerClass(markerValue, sheetName);

            html += `
                <tr class="hover:bg-blue-50 transition">
                    <td class="p-3 border border-slate-200 font-bold">${effect.output_tag || "-"}</td>
                    <td class="p-3 border border-slate-200">${effect.action || "-"}</td>
                    <td class="p-3 border border-slate-200">
                        <span class="${markerClass}">${markerValue}</span>
                    </td>
                </tr>
            `;
        });

        html += `
                        </tbody>
                    </table>
                </td>
            </tr>
        `;
    }

    html += `
                </tbody>
            </table>
        </div>
    `;

    return html;
}


// ===============================
// Render Effects Table (BLOCK LEVEL)
// ===============================
function renderBlockEffectsTable(effectsObj, sheetName) {
    if (!effectsObj || Object.keys(effectsObj).length === 0) {
        return `<p class="text-sm italic text-slate-600 bg-slate-100 p-3 rounded-lg border border-slate-300 mt-3">
                    No triggered effects found for this logic block.
                </p>`;
    }

    let html = `
        <div class="overflow-x-auto mt-4 rounded-2xl shadow-md border border-slate-200">
            <table class="w-full border-collapse bg-white rounded-2xl overflow-hidden text-sm">
                <thead class="bg-gradient-to-r from-blue-700 to-purple-700 text-white">
                    <tr>
                        <th class="p-4 text-left w-[35%]">Effect Description</th>
                        <th class="p-4 text-left w-[65%]">Output Tag / Action / Markers</th>
                    </tr>
                </thead>
                <tbody>
    `;

    for (let effectKey in effectsObj) {
        let eff = effectsObj[effectKey];

        let markerSummary = "";

        if (eff.markers && eff.markers.length > 0) {
            eff.markers.forEach(mk => {
                let cls = getMarkerClass(mk, sheetName);
                markerSummary += `<span class="${cls}" style="margin-right:6px;">${mk}</span>`;
            });
        }

        html += `
            <tr class="border border-slate-200 hover:bg-slate-50 transition">
                <td class="bg-slate-50 p-4 font-extrabold text-slate-900 align-top">
                    ${eff.effect_desc || eff.effect_id || "UNKNOWN"}
                </td>
                <td class="p-4">
                    <div><b>Output Tag:</b> <span class="font-bold text-blue-700">${eff.output_tag || "-"}</span></div>
                    <div class="mt-1"><b>Action:</b> ${eff.action || "-"}</div>
                    <div class="mt-3"><b>Markers:</b> ${markerSummary || "-"}</div>
                </td>
            </tr>
        `;
    }

    html += `
                </tbody>
            </table>
        </div>
    `;

    return html;
}


// ===============================
// Render LOGIC BLOCK
// ===============================
function renderLogicBlock(block, blockNumber) {

    let logic = block.voting_logic || "";
    let desc = block.cause_description || "-";
    let comment = block.comment || "-";
    let importantComment = block.important_comment || "-";

    let hasAnd = block.has_and_logic === true;
    let hasLogic = logic !== "" && logic !== "-";

    let html = `
        <div class="mt-6 p-6 rounded-3xl border border-slate-200 bg-white/80 shadow-xl backdrop-blur-md">

            <div class="flex justify-between items-center border-b border-slate-200 pb-4">
                <h4 class="text-lg font-black text-slate-900">
                    Cause-Effect Block <span class="text-blue-700">#${blockNumber}</span>
                </h4>

                <div class="flex gap-2 flex-wrap">
                    ${hasLogic ? `<span class="px-4 py-2 rounded-full text-xs font-black bg-gradient-to-r from-blue-700 to-purple-700 text-white shadow">
                        Functional Logic: ${logic}
                    </span>` : ""}
                </div>
            </div>

            <div class="mt-5 bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                <p class="text-sm text-slate-700 leading-relaxed">
                    <b class="text-slate-900">Description:</b> ${desc}
                </p>

                <div class="mt-4">
                    <p class="text-sm font-black text-red-700">
                        Important Comments:
                    </p>
                    <div class="mt-2 whitespace-pre-line text-red-600 font-semibold bg-red-50 border border-red-200 p-4 rounded-2xl">
                        ${importantComment}
                    </div>
                </div>
            </div>
    `;

    if (hasLogic) {

        html += `
            <div class="mt-6 bg-gradient-to-r from-slate-50 to-blue-50 border border-blue-200 rounded-2xl p-6 shadow-sm">

                <div class="flex justify-center">
                    <div class="px-8 py-3 rounded-2xl font-black text-sm bg-white border-2 border-blue-600 text-blue-900 shadow-lg">
                        ${logic}
                    </div>
                </div>
        `;

        if (hasAnd && block.and_groups && block.and_groups.length > 0) {

            html += `
                <div class="flex justify-center mt-4 text-3xl font-black text-slate-500">
                    ↓
                </div>

                <div class="flex justify-center gap-6 mt-4 flex-wrap">
            `;

            block.and_groups.forEach((grp, idx) => {

                let tagListHtml = "";
                if (grp.tags && grp.tags.length > 0) {
                    grp.tags.forEach(tag => {
                        tagListHtml += `
                            <div class="text-xs font-black bg-white border border-slate-200 px-4 py-3 rounded-xl mb-3 shadow-sm hover:shadow-md transition">
                                ${tag.input_tag || "-"}
                            </div>
                        `;
                    });
                } else {
                    tagListHtml = `<div class="text-xs italic text-slate-500">No tags</div>`;
                }

                html += `
                    <div class="p-5 rounded-2xl border border-orange-200 bg-gradient-to-br from-orange-50 to-white min-w-[240px] shadow-md hover:shadow-xl transition">

                        <div class="text-center mb-4">
                        <span class="px-5 py-2 rounded-full bg-gradient-to-r from-orange-600 to-red-600 text-white text-xs font-black shadow">
                            ${(grp.logic || "AND")} Group ${idx + 1}
                        </span>
                        </div>

                        <div class="mt-2">
                            ${tagListHtml}
                        </div>

                    </div>
                `;
            });

            html += `</div>`;
        }

        html += `</div>`;
    }

    if (hasAnd && block.and_groups && block.and_groups.length > 0) {

        block.and_groups.forEach((grp, idx) => {

            html += `
                <div class="mt-5 p-5 rounded-2xl bg-white border border-slate-200 shadow-md">

                    <h5 class="text-sm font-black text-slate-900 mb-4 flex items-center gap-2">
                        <span class="px-4 py-2 rounded-full bg-gradient-to-r from-orange-600 to-red-600 text-white text-xs font-black shadow">
                            ${(grp.logic || "AND")} Group ${idx + 1}
                        </span>
                        <span class="text-xs text-slate-500 font-bold">Input Details</span>
                    </h5>

                    <div class="overflow-x-auto rounded-2xl border border-slate-200 shadow-sm">
                        <table class="w-full border-collapse text-xs bg-white">
                            <thead class="bg-slate-900 text-white">
                                <tr>
                                    <th class="p-3 border border-slate-200">Input Tag</th>
                                    <th class="p-3 border border-slate-200">Cause Identifier</th>
                                    <th class="p-3 border border-slate-200">Signal</th>
                                    <th class="p-3 border border-slate-200">Warn</th>
                                    <th class="p-3 border border-slate-200">Limit</th>
                                    <th class="p-3 border border-slate-200">Hyst</th>
                                    <th class="p-3 border border-slate-200">Unit</th>
                                    <th class="p-3 border border-slate-200">Delay</th>
                                    <th class="p-3 border border-slate-200">Comment</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            grp.tags.forEach(tag => {
                html += `
                    <tr class="hover:bg-blue-50 transition">
                        <td class="p-3 border border-slate-200 font-black whitespace-nowrap text-blue-700">${tag.input_tag || "-"}</td>
                        <td class="p-3 border border-slate-200 whitespace-nowrap">${tag.cause_identifier || "-"}</td>
                        <td class="p-3 border border-slate-200 whitespace-nowrap">${tag.signal || "-"}</td>
                        <td class="p-3 border border-slate-200 whitespace-nowrap">${tag.warn || "-"}</td>
                        <td class="p-3 border border-slate-200 whitespace-nowrap">${tag.limit || "-"}</td>
                        <td class="p-3 border border-slate-200 whitespace-nowrap">${tag.hyst || "-"}</td>
                        <td class="p-3 border border-slate-200 whitespace-nowrap">${tag.unit || "-"}</td>
                        <td class="p-3 border border-slate-200 whitespace-nowrap">${tag.delay || "-"}</td>
                        <td class="p-3 border border-slate-200 min-w-[250px]">${tag.comment || "-"}</td>
                    </tr>
                `;
            });

            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        });
    }

    if (!hasAnd && hasLogic && block.and_groups && block.and_groups.length > 0) {

        html += `
            <div class="mt-5 p-5 rounded-2xl bg-gradient-to-r from-blue-50 to-purple-50 border border-blue-200 shadow-md">
                <div class="overflow-x-auto rounded-2xl border border-slate-200 shadow-sm">
                    <table class="w-full border-collapse text-xs bg-white">
                        <thead class="bg-slate-900 text-white">
                            <tr>
                                <th class="p-3 border border-slate-200">Input Tag</th>
                                <th class="p-3 border border-slate-200">Cause Identifier</th>
                                <th class="p-3 border border-slate-200">Signal</th>
                                <th class="p-3 border border-slate-200">Warn</th>
                                <th class="p-3 border border-slate-200">Limit</th>
                                <th class="p-3 border border-slate-200">Hyst</th>
                                <th class="p-3 border border-slate-200">Unit</th>
                                <th class="p-3 border border-slate-200">Delay</th>
                                <th class="p-3 border border-slate-200">Comment</th>
                            </tr>
                        </thead>
                        <tbody>
        `;

        block.and_groups.forEach(grp => {
            grp.tags.forEach(tag => {
                html += `
                    <tr class="hover:bg-purple-50 transition">
                        <td class="p-3 border border-slate-200 font-black whitespace-nowrap text-blue-700">${tag.input_tag || "-"}</td>
                        <td class="p-3 border border-slate-200 whitespace-nowrap">${tag.cause_identifier || "-"}</td>
                        <td class="p-3 border border-slate-200 whitespace-nowrap">${tag.signal || "-"}</td>
                        <td class="p-3 border border-slate-200 whitespace-nowrap">${tag.warn || "-"}</td>
                        <td class="p-3 border border-slate-200 whitespace-nowrap">${tag.limit || "-"}</td>
                        <td class="p-3 border border-slate-200 whitespace-nowrap">${tag.hyst || "-"}</td>
                        <td class="p-3 border border-slate-200 whitespace-nowrap">${tag.unit || "-"}</td>
                        <td class="p-3 border border-slate-200 whitespace-nowrap">${tag.delay || "-"}</td>
                        <td class="p-3 border border-slate-200 min-w-[250px]">${tag.comment || "-"}</td>
                    </tr>
                `;
            });
        });

        html += `
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }

    html += `
        <div class="mt-7">
            <h5 class="text-sm font-black text-slate-900 mb-3">
                Effects Summary
            </h5>
            ${renderBlockEffectsTable(block.effects, block.sheet)}
        </div>
    `;

    html += `</div>`;
    return html;
}


// ============================================================
// MESSAGE ONLY TABLE RENDER
// ============================================================

                <td class="p-4 whitespace-nowrap">${rec.unit || "-"}</td>
                <td class="p-4 whitespace-nowrap">${rec.w_dc || "-"}</td>

                <td class="p-4 whitespace-nowrap">${rec.func2 || "-"}</td>
                <td class="p-4 min-w-[250px]">${rec.cause_description || "-"}</td>

            </tr>
        `;
    });

    html += `

            </table>

    `;

    return html;
}


// ============================================================
// TAB SWITCHER
// ============================================================
function switchTab(tabName) {

    let sisPanel = document.getElementById("sisPanel");
    let opPanel = document.getElementById("opPanel");
    let msgPanel = document.getElementById("messagePanel");

    let tabSIS = document.getElementById("tabSIS");
    let tabOP = document.getElementById("tabOP");
    let tabMSG = document.getElementById("tabMSG");

    // hide all
    if (sisPanel) sisPanel.classList.add("hidden");
    if (opPanel) opPanel.classList.add("hidden");
    if (msgPanel) msgPanel.classList.add("hidden");

    // reset tabs
    if (tabSIS) tabSIS.className = "tab-btn";
    if (tabOP) tabOP.className = "tab-btn";
    if (tabMSG) tabMSG.className = "tab-btn";

    // show selected
    if (tabName === "SIS") {
        sisPanel.classList.remove("hidden");
        tabSIS.className = "tab-btn tab-active tab-sis";
    }

    if (tabName === "OP") {
        opPanel.classList.remove("hidden");
        tabOP.className = "tab-btn tab-active tab-op";
    }

    if (tabName === "MSG") {
        msgPanel.classList.remove("hidden");
        tabMSG.className = "tab-btn tab-active tab-msg";
    }
}


// ===============================
// SEARCH API CALL
// ===============================
async function searchData() {
    let query = document.getElementById("searchInput").value.trim();
    let resultBox = document.getElementById("resultBox");

    if (!query) {
        resultBox.innerHTML = `
            <div class="bg-red-50 border border-red-200 text-red-700 font-black text-center p-5 rounded-2xl shadow-md">
                Please enter an Input Tag.
            </div>
        `;
        return;
    }

    resultBox.innerHTML = `
        <div class="text-center text-blue-700 font-black text-lg animate-pulse">
            Searching...
        </div>
    `;

    try {
        let response = await fetch(`/search?q=${encodeURIComponent(query)}`);
        let data = await response.json();

        if (data.error) {
            resultBox.innerHTML = `
                <div class="bg-red-50 border border-red-200 text-red-700 font-black text-center p-5 rounded-2xl shadow-md">
                    ${data.error}
                </div>
            `;
            return;
        }

        let logicCount = data.logic_block_count || 0;
        let messageCount = data.message_only_count || 0;

        let html = `
            <div class="bg-white/80 backdrop-blur-md p-6 rounded-3xl border border-slate-200 shadow-xl mb-8 border-l-8 border-blue-600">
                <h2 class="text-xl font-black">
                    Results for: <span class="text-blue-700">${data.query}</span>
                </h2>
                <p class="text-sm text-slate-700 mt-2 font-semibold">
                    Logic Blocks Found: <b>${logicCount}</b> |
                    Message Only Matches: <b>${messageCount}</b>
                </p>
            </div>
        `;

        if (logicCount === 0 && messageCount === 0) {
            resultBox.innerHTML = html + `
                <div class="text-center bg-red-50 border border-red-200 text-red-700 font-black p-5 rounded-2xl shadow-md">
                    No match found.
                </div>
            `;
            return;
        }

        // ===========================
        // LOGIC BLOCKS
        // ===========================
        let sisBlocks = [];
        let opBlocks = [];

        for (let sheet in data.logic_blocks) {
            if (sheet.toUpperCase().includes("SIS")) {
                sisBlocks.push({ sheet, blocks: data.logic_blocks[sheet] });
            } else if (sheet.toUpperCase().includes("OPERATIONAL")) {
                opBlocks.push({ sheet, blocks: data.logic_blocks[sheet] });
            }
        }

        let blockCounter = 1;

        // ===========================
        // TABS HEADER
        // ===========================
        html += `
            <style>
                .tab-btn {
                    padding: 14px 26px;
                    border-radius: 16px;
                    font-weight: 900;
                    font-size: 14px;
                    background: rgba(241,245,249,0.9);
                    color: #0f172a;
                    border: 2px solid #e2e8f0;
                    transition: 0.25s;
                    cursor: pointer;
                }

                .tab-btn:hover {
                    transform: translateY(-2px);
                    box-shadow: 0px 8px 18px rgba(0,0,0,0.10);
                }

                .tab-active {
                    color: white !important;
                    border: 2px solid transparent !important;
                    box-shadow: 0px 8px 20px rgba(0,0,0,0.20);
                }

                .tab-sis {
                    background: linear-gradient(90deg, #f97316, #ea580c);
                }

                .tab-op {
                    background: linear-gradient(90deg, #16a34a, #15803d);
                }

                .tab-msg {
                    background: linear-gradient(90deg, #7c3aed, #4f46e5);
                }
            </style>

            <div class="bg-white/70 backdrop-blur-xl rounded-3xl border border-slate-200 shadow-2xl overflow-hidden">

                <div class="flex justify-center gap-6 p-6 bg-white/70 border-b border-slate-200">
                    <button id="tabSIS" class="tab-btn tab-active tab-sis" onclick="switchTab('SIS')">
                        SIS
                    </button>

                    <button id="tabOP" class="tab-btn tab-op" onclick="switchTab('OP')">
                        Operational
                    </button>

                    <button id="tabMSG" class="tab-btn tab-msg" onclick="switchTab('MSG')">
                        Message Only
                    </button>
                </div>

                <!-- SIS PANEL -->
                <div id="sisPanel" class="p-6 overflow-y-auto panel-height">
                    <h3 class="text-lg font-black bg-orange-50 border-l-8 border-orange-500 p-4 rounded-2xl shadow-sm">
                        SIS Cause-Effect Blocks
                    </h3>
        `;

        if (sisBlocks.length === 0) {
            html += `<p class="mt-4 text-slate-600 italic">No SIS data found.</p>`;
        } else {
            sisBlocks.forEach(obj => {
                html += `<h4 class="mt-5 text-md font-black text-blue-700">Sheet: ${obj.sheet}</h4>`;
                obj.blocks.forEach(block => {
                    html += renderLogicBlock(block, blockCounter++);
                });
            });
        }

        html += `
                </div>

                <!-- OP PANEL -->
                <div id="opPanel" class="p-6 overflow-y-auto panel-height hidden">
                    <h3 class="text-lg font-black bg-green-50 border-l-8 border-green-600 p-4 rounded-2xl shadow-sm">
                        Operational Cause-Effect Blocks
                    </h3>
        `;

        if (opBlocks.length === 0) {
            html += `<p class="mt-4 text-slate-600 italic">No Operational data found.</p>`;
        } else {
            opBlocks.forEach(obj => {
                html += `<h4 class="mt-5 text-md font-black text-blue-700">Sheet: ${obj.sheet}</h4>`;
                obj.blocks.forEach(block => {
                    html += renderLogicBlock(block, blockCounter++);
                });
            });
        }

        html += `
                </div>

                <!-- MESSAGE ONLY PANEL -->
                <div id="messagePanel" class="p-6 overflow-y-auto panel-height hidden">
                    <h3 class="text-lg font-black bg-purple-50 border-l-8 border-purple-700 p-4 rounded-2xl shadow-sm">
                        Message Only Sheet Data
                    </h3>

                    ${renderMessageOnlyTable(data.message_only || [])}
                </div>

            </div>
        `;

        resultBox.innerHTML = html;

        // default active tab SIS
        switchTab("SIS");

    } catch (err) {
        resultBox.innerHTML = `
            <div class="bg-red-50 border border-red-200 text-red-700 font-black text-center p-5 rounded-2xl shadow-md">
                Error: ${err}
            </div>
        `;
    }
}

// Enter triggers search
document.getElementById("searchInput").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        searchData();
    }
});
</script>

</body>
</html>
