<!DOCTYPE html>
<html>
<head>
    <title>Cause & Effect Search</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Your CSS (minimal) -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-slate-100 text-slate-800">

<div class="max-w-[1600px] mx-auto px-6 py-8">

    <h1 class="text-3xl font-extrabold text-center text-slate-900 mb-8 tracking-wide">
        Cause & Effect Matrix Search
    </h1>

    <!-- Search -->
    <div class="flex justify-center gap-3 mb-8">
        <input type="text" id="searchInput"
            placeholder="Enter Input Tag (Example: G01NHY01KF101-KZ75)"
            class="w-[700px] px-4 py-3 border border-slate-300 rounded-xl outline-none bg-white focus:ring-4 focus:ring-blue-200 focus:border-blue-600 transition"
        />

        <button onclick="searchData()"
            class="px-6 py-3 rounded-xl bg-blue-600 text-white font-semibold hover:bg-blue-700 transition">
            Search
        </button>
    </div>

    <div id="resultBox"></div>

</div>

<script>
// ===============================
// Marker Styling
// ===============================
function getMarkerClass(marker, sheetName) {
    if (!marker) return "marker";

    marker = marker.toUpperCase().trim();
    sheetName = (sheetName || "").toUpperCase().trim();

    if (sheetName === "ELY SYSTEM - SIS") {
        if (marker.endsWith("*")) return "marker marker-sis-light";
        return "marker marker-sis-dark";
    }

    if (sheetName === "ELY SYSTEM - OPERATIONAL") {
        if (marker === "S") return "marker marker-op-dark";
        if (marker === "N" || marker === "NP") return "marker marker-op-light";
        return "marker marker-op-light";
    }

    return "marker marker-default";
}

// ===============================
// Group Effects by Description
// ===============================
function groupEffectsByDescription(effects) {
    let grouped = {};

    effects.forEach(effect => {
        let key = effect.effect_desc || effect.effect_id || "UNKNOWN EFFECT";
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(effect);
    });

    return grouped;
}

// ===============================
// Render Effects Table (Row Based)
// ===============================
function renderEffectsMasterTable(effects, sheetName) {
    if (!effects || effects.length === 0) {
        return `<p class="text-sm italic text-slate-600 bg-slate-100 p-3 rounded-lg border border-slate-300 mt-3">
                    No triggered effects found.
                </p>`;
    }

    let grouped = groupEffectsByDescription(effects);

    let html = `
        <div class="overflow-x-auto mt-4 rounded-xl">
            <table class="w-full border-collapse bg-white rounded-xl overflow-hidden text-sm">
                <thead class="bg-blue-600 text-white">
                    <tr>
                        <th class="p-3 text-left w-[35%]">Effect Description</th>
                        <th class="p-3 text-left w-[65%]">Output Tag / Action / Marker</th>
                    </tr>
                </thead>
                <tbody>
    `;

    for (let effectHeader in grouped) {

        html += `
            <tr class="border border-slate-200">
                <td class="bg-slate-100 p-3 font-semibold text-slate-900 align-top">
                    ${effectHeader}
                </td>
                <td class="p-3">
                    <table class="w-full border-collapse text-xs bg-white">
                        <thead class="bg-slate-800 text-white">
                            <tr>
                                <th class="p-2 border border-slate-200 text-left">Output Tag</th>
                                <th class="p-2 border border-slate-200 text-left">Action</th>
                                <th class="p-2 border border-slate-200 text-left w-[100px]">Marker</th>
                            </tr>
                        </thead>
                        <tbody>
        `;

        grouped[effectHeader].forEach(effect => {
            let markerValue = effect.marker || "-";
            let markerClass = getMarkerClass(markerValue, sheetName);

            html += `
                <tr class="hover:bg-slate-50 transition">
                    <td class="p-2 border border-slate-200">${effect.output_tag || "-"}</td>
                    <td class="p-2 border border-slate-200">${effect.action || "-"}</td>
                    <td class="p-2 border border-slate-200">
                        <span class="${markerClass}">${markerValue}</span>
                    </td>
                </tr>
            `;
        });

        html += `
                        </tbody>
                    </table>
                </td>
            </tr>
        `;
    }

    html += `
                </tbody>
            </table>
        </div>
    `;

    return html;
}


// ===============================
// Render Effects Table (BLOCK LEVEL)
// ===============================
function renderBlockEffectsTable(effectsObj, sheetName) {
    if (!effectsObj || Object.keys(effectsObj).length === 0) {
        return `<p class="text-sm italic text-slate-600 bg-slate-100 p-3 rounded-lg border border-slate-300 mt-3">
                    No triggered effects found for this logic block.
                </p>`;
    }

    let html = `
        <div class="overflow-x-auto mt-4 rounded-xl">
            <table class="w-full border-collapse bg-white rounded-xl overflow-hidden text-sm">
                <thead class="bg-blue-600 text-white">
                    <tr>
                        <th class="p-3 text-left w-[35%]">Effect Description</th>
                        <th class="p-3 text-left w-[65%]">Output Tag / Action / Markers</th>
                    </tr>
                </thead>
                <tbody>
    `;

    for (let effectKey in effectsObj) {
        let eff = effectsObj[effectKey];

        let markerSummary = "";

        if (eff.markers && eff.markers.length > 0) {
            eff.markers.forEach(mk => {
                let cls = getMarkerClass(mk, sheetName);
                markerSummary += `<span class="${cls}" style="margin-right:6px;">${mk}</span>`;
            });
        }

        html += `
            <tr class="border border-slate-200">
                <td class="bg-slate-100 p-3 font-semibold text-slate-900 align-top">
                    ${eff.effect_desc || eff.effect_id || "UNKNOWN"}
                </td>
                <td class="p-3">
                    <div><b>Output Tag:</b> ${eff.output_tag || "-"}</div>
                    <div><b>Action:</b> ${eff.action || "-"}</div>
                    <div class="mt-2"><b>Markers:</b> ${markerSummary || "-"}</div>
                </td>
            </tr>
        `;
    }

    html += `
                </tbody>
            </table>
        </div>
    `;

    return html;
}


// ===============================
// Render LOGIC BLOCK
// ===============================
function renderLogicBlock(block, blockNumber) {

    let logic = block.voting_logic || "";
    let desc = block.cause_description || "-";
    let comment = block.comment || "-";
    let importantComment = block.important_comment || "-";

    let hasAnd = block.has_and_logic === true;
    let hasLogic = logic !== "" && logic !== "-";

    let html = `
        <div class="mt-5 p-5 rounded-2xl border-2 border-blue-100 bg-blue-50 shadow-sm">

            <div class="flex justify-between items-center border-b-2 border-blue-100 pb-3">
                <h4 class="text-lg font-extrabold text-slate-900">
                    Cause-Effect ${blockNumber}
                </h4>

                <div class="flex gap-2">
                    ${hasLogic ? `<span class="px-3 py-1 rounded-full text-xs font-bold bg-blue-700 text-white">
                        Functional Logic: ${logic}
                    </span>` : ""}
                </div>
            </div>

            <div class="mt-4 bg-white border border-slate-200 rounded-xl p-4">
                <p class="text-sm text-slate-700"><b>Description:</b> ${desc}</p>
                <p class="text-sm mt-2">
                    <b>Important Comments:</b>
                    <div class="mt-1 whitespace-pre-line text-red-700 font-semibold">
                        ${importantComment}
                    </div>
                </p>
            </div>
    `;

    if (hasLogic) {

        html += `
            <div class="mt-6 bg-white border-2 border-dashed border-slate-400 rounded-xl p-5">

                <div class="flex justify-center">
                    <div class="px-6 py-2 rounded-xl font-extrabold text-sm bg-blue-100 border-2 border-blue-600 text-blue-900">
                        ${logic}
                    </div>
                </div>
        `;

        if (hasAnd && block.and_groups && block.and_groups.length > 0) {

            html += `
                <div class="flex justify-center mt-3 text-2xl font-black text-slate-600">
                    ↓
                </div>

                <div class="flex justify-center gap-6 mt-3 flex-wrap">
            `;

            block.and_groups.forEach((grp, idx) => {

                let tagListHtml = "";
                if (grp.tags && grp.tags.length > 0) {
                    grp.tags.forEach(tag => {
                        tagListHtml += `
                            <div class="text-xs font-bold bg-slate-50 border border-slate-300 px-3 py-2 rounded-lg mb-2">
                                ${tag.input_tag || "-"}
                            </div>
                        `;
                    });
                } else {
                    tagListHtml = `<div class="text-xs italic text-slate-500">No tags</div>`;
                }

                html += `
                    <div class="p-4 rounded-xl border-2 border-orange-500 bg-orange-50 min-w-[220px] shadow-sm">

                        <div class="text-center mb-3">
                        <span class="px-4 py-1 rounded-full bg-orange-600 text-white text-xs font-extrabold">
                            ${(grp.logic || "AND")} Group ${idx + 1}
                        </span>
                        </div>

                        <div class="mt-2">
                            ${tagListHtml}
                        </div>

                    </div>
                `;
            });

            html += `</div>`;
        }

        html += `</div>`;
    }

    if (hasAnd && block.and_groups && block.and_groups.length > 0) {

        block.and_groups.forEach((grp, idx) => {

            html += `
                <div class="mt-4 p-4 rounded-xl bg-white border border-slate-300">

                    <h5 class="text-sm font-extrabold text-blue-700 mb-3">
                    <span class="px-3 py-1 rounded-full bg-orange-500 text-white text-xs font-bold">
                        ${(grp.logic || "AND")} Group ${idx + 1}
                    </span>
                    </h5>

                    <div class="overflow-x-auto">
                        <table class="w-full border-collapse text-xs">
                            <thead class="bg-slate-900 text-white">
                                <tr>
                                    <th class="p-2 border border-slate-200">Input Tag</th>
                                    <th class="p-2 border border-slate-200">Cause Identifier</th>
                                    <th class="p-2 border border-slate-200">Signal</th>
                                    <th class="p-2 border border-slate-200">Warn</th>
                                    <th class="p-2 border border-slate-200">Limit</th>
                                    <th class="p-2 border border-slate-200">Hyst</th>
                                    <th class="p-2 border border-slate-200">Unit</th>
                                    <th class="p-2 border border-slate-200">Delay</th>
                                    <th class="p-2 border border-slate-200">Comment</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            grp.tags.forEach(tag => {
                html += `
                    <tr class="hover:bg-slate-100 transition">
                        <td class="p-2 border border-slate-200 font-bold whitespace-nowrap">${tag.input_tag || "-"}</td>
                        <td class="p-2 border border-slate-200 whitespace-nowrap">${tag.cause_identifier || "-"}</td>
                        <td class="p-2 border border-slate-200 whitespace-nowrap">${tag.signal || "-"}</td>
                        <td class="p-2 border border-slate-200 whitespace-nowrap">${tag.warn || "-"}</td>
                        <td class="p-2 border border-slate-200 whitespace-nowrap">${tag.limit || "-"}</td>
                        <td class="p-2 border border-slate-200 whitespace-nowrap">${tag.hyst || "-"}</td>
                        <td class="p-2 border border-slate-200 whitespace-nowrap">${tag.unit || "-"}</td>
                        <td class="p-2 border border-slate-200 whitespace-nowrap">${tag.delay || "-"}</td>
                        <td class="p-2 border border-slate-200 min-w-[250px]">${tag.comment || "-"}</td>
                    </tr>
                `;
            });

            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        });
    }

    if (!hasAnd && hasLogic && block.and_groups && block.and_groups.length > 0) {

        html += `
            <div class="mt-4 p-4 rounded-xl bg-white border-2 border-blue-500">
                <div class="overflow-x-auto">
                    <table class="w-full border-collapse text-xs">
                        <thead class="bg-slate-900 text-white">
                            <tr>
                                <th class="p-2 border border-slate-200">Input Tag</th>
                                <th class="p-2 border border-slate-200">Cause Identifier</th>
                                <th class="p-2 border border-slate-200">Signal</th>
                                <th class="p-2 border border-slate-200">Warn</th>
                                <th class="p-2 border border-slate-200">Limit</th>
                                <th class="p-2 border border-slate-200">Hyst</th>
                                <th class="p-2 border border-slate-200">Unit</th>
                                <th class="p-2 border border-slate-200">Delay</th>
                                <th class="p-2 border border-slate-200">Comment</th>
                            </tr>
                        </thead>
                        <tbody>
        `;

        block.and_groups.forEach(grp => {
            grp.tags.forEach(tag => {
                html += `
                    <tr class="hover:bg-slate-100 transition">
                        <td class="p-2 border border-slate-200 font-bold whitespace-nowrap">${tag.input_tag || "-"}</td>
                        <td class="p-2 border border-slate-200 whitespace-nowrap">${tag.cause_identifier || "-"}</td>
                        <td class="p-2 border border-slate-200 whitespace-nowrap">${tag.signal || "-"}</td>
                        <td class="p-2 border border-slate-200 whitespace-nowrap">${tag.warn || "-"}</td>
                        <td class="p-2 border border-slate-200 whitespace-nowrap">${tag.limit || "-"}</td>
                        <td class="p-2 border border-slate-200 whitespace-nowrap">${tag.hyst || "-"}</td>
                        <td class="p-2 border border-slate-200 whitespace-nowrap">${tag.unit || "-"}</td>
                        <td class="p-2 border border-slate-200 whitespace-nowrap">${tag.delay || "-"}</td>
                        <td class="p-2 border border-slate-200 min-w-[250px]">${tag.comment || "-"}</td>
                    </tr>
                `;
            });
        });

        html += `
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }

    html += `
        <div class="mt-6">
            <h5 class="text-sm font-extrabold text-slate-900 mb-3">Effects Summary</h5>
            ${renderBlockEffectsTable(block.effects, block.sheet)}
        </div>
    `;

    html += `</div>`;
    return html;
}


// ============================================================
// MESSAGE ONLY TABLE RENDER
// ============================================================
function renderMessageOnlyTable(records) {

    if (!records || records.length === 0) {
        return `
            <div class="text-center bg-red-50 border border-red-200 text-red-700 font-bold p-4 rounded-xl mt-4">
                No Message Only records found.
            </div>
        `;
    }

    let html = `
        <div class="overflow-x-auto mt-5 rounded-xl">
            <table class="w-full border-collapse bg-white rounded-xl overflow-hidden text-sm">
                <thead class="bg-purple-700 text-white">
                    <tr>
                        <th class="p-3 text-left">Input Tag</th>
                        <th class="p-3 text-left">Signal</th>
                        <th class="p-3 text-left">Warn</th>
                        <th class="p-3 text-left">Alarm</th>
                        <th class="p-3 text-left">Hyst</th>
                        <th class="p-3 text-left">Unit</th>
                        <th class="p-3 text-left">W_DC</th>
                        <th class="p-3 text-left">Func 1</th>
                        <th class="p-3 text-left">Func 2</th>
                        <th class="p-3 text-left">Cause Description</th>
                        <th class="p-3 text-left">Comment</th>
                    </tr>
                </thead>
                <tbody>
    `;

    records.forEach(rec => {
        html += `
            <tr class="border border-slate-200 hover:bg-slate-50 transition">
                <td class="p-3 font-bold whitespace-nowrap">${rec.input_tag || "-"}</td>
                <td class="p-3 whitespace-nowrap">${rec.signal || "-"}</td>
                <td class="p-3 whitespace-nowrap">${rec.warn || "-"}</td>
                <td class="p-3 whitespace-nowrap">${rec.alarm || "-"}</td>
                <td class="p-3 whitespace-nowrap">${rec.hyst || "-"}</td>
                <td class="p-3 whitespace-nowrap">${rec.unit || "-"}</td>
                <td class="p-3 whitespace-nowrap">${rec.w_dc || "-"}</td>
                <td class="p-3 whitespace-nowrap">${rec.func1 || "-"}</td>
                <td class="p-3 whitespace-nowrap">${rec.func2 || "-"}</td>
                <td class="p-3 min-w-[250px]">${rec.cause_description || "-"}</td>
                <td class="p-3 min-w-[300px] whitespace-pre-line">${rec.comment || "-"}</td>
            </tr>
        `;
    });

    html += `
                </tbody>
            </table>
        </div>
    `;

    return html;
}


// ============================================================
// TAB SWITCHER
// ============================================================
function switchTab(tabName) {

    let sisPanel = document.getElementById("sisPanel");
    let opPanel = document.getElementById("opPanel");
    let msgPanel = document.getElementById("messagePanel");

    let tabSIS = document.getElementById("tabSIS");
    let tabOP = document.getElementById("tabOP");
    let tabMSG = document.getElementById("tabMSG");

    // hide all
    if (sisPanel) sisPanel.classList.add("hidden");
    if (opPanel) opPanel.classList.add("hidden");
    if (msgPanel) msgPanel.classList.add("hidden");

    // reset tabs
    if (tabSIS) tabSIS.className = "tab-btn";
    if (tabOP) tabOP.className = "tab-btn";
    if (tabMSG) tabMSG.className = "tab-btn";

    // show selected
    if (tabName === "SIS") {
        sisPanel.classList.remove("hidden");
        tabSIS.className = "tab-btn tab-active tab-sis";
    }

    if (tabName === "OP") {
        opPanel.classList.remove("hidden");
        tabOP.className = "tab-btn tab-active tab-op";
    }

    if (tabName === "MSG") {
        msgPanel.classList.remove("hidden");
        tabMSG.className = "tab-btn tab-active tab-msg";
    }
}


// ===============================
// SEARCH API CALL
// ===============================
async function searchData() {
    let query = document.getElementById("searchInput").value.trim();
    let resultBox = document.getElementById("resultBox");

    if (!query) {
        resultBox.innerHTML = `
            <div class="bg-red-100 border border-red-300 text-red-700 font-bold text-center p-4 rounded-xl">
                Please enter an Input Tag.
            </div>
        `;
        return;
    }

    resultBox.innerHTML = `
        <div class="text-center text-blue-600 font-extrabold text-lg">
            Searching...
        </div>
    `;

    try {
        let response = await fetch(`/search?q=${encodeURIComponent(query)}`);
        let data = await response.json();

        if (data.error) {
            resultBox.innerHTML = `
                <div class="bg-red-100 border border-red-300 text-red-700 font-bold text-center p-4 rounded-xl">
                    ${data.error}
                </div>
            `;
            return;
        }

        let logicCount = data.logic_block_count || 0;
        let messageCount = data.message_only_count || 0;

        let html = `
            <div class="bg-white p-5 rounded-xl border border-blue-200 shadow-sm mb-6 border-l-8 border-blue-600">
                <h2 class="text-lg font-extrabold">
                    Results for: <span class="text-blue-600">${data.query}</span>
                </h2>
                <p class="text-sm text-slate-700 mt-1">
                    Logic Blocks Found: <b>${logicCount}</b> |
                    Message Only Matches: <b>${messageCount}</b>
                </p>
            </div>
        `;

        if (logicCount === 0 && messageCount === 0) {
            resultBox.innerHTML = html + `
                <div class="text-center bg-red-50 border border-red-200 text-red-700 font-bold p-4 rounded-xl">
                    No match found.
                </div>
            `;
            return;
        }

        // ===========================
        // LOGIC BLOCKS
        // ===========================
        let sisBlocks = [];
        let opBlocks = [];

        for (let sheet in data.logic_blocks) {
            if (sheet.toUpperCase().includes("SIS")) {
                sisBlocks.push({ sheet, blocks: data.logic_blocks[sheet] });
            } else if (sheet.toUpperCase().includes("OPERATIONAL")) {
                opBlocks.push({ sheet, blocks: data.logic_blocks[sheet] });
            }
        }

        let blockCounter = 1;

        // ===========================
        // TABS HEADER (BEAUTIFUL)
        // ===========================
        html += `
            <style>
                .tab-btn {
                    padding: 12px 22px;
                    border-radius: 14px;
                    font-weight: 900;
                    font-size: 14px;
                    background: #f1f5f9;
                    color: #0f172a;
                    border: 2px solid #e2e8f0;
                    transition: 0.25s;
                    cursor: pointer;
                }

                .tab-btn:hover {
                    transform: translateY(-2px);
                    box-shadow: 0px 4px 12px rgba(0,0,0,0.08);
                }

                .tab-active {
                    color: white !important;
                    border: 2px solid transparent !important;
                    box-shadow: 0px 6px 16px rgba(0,0,0,0.15);
                }

                .tab-sis {
                    background: linear-gradient(90deg, #f97316, #ea580c);
                }

                .tab-op {
                    background: linear-gradient(90deg, #16a34a, #15803d);
                }

                .tab-msg {
                    background: linear-gradient(90deg, #7c3aed, #6d28d9);
                }
            </style>

            <div class="bg-white rounded-2xl border border-slate-200 shadow-md overflow-hidden">

                <div class="flex justify-center gap-5 p-5 bg-slate-50 border-b border-slate-200">
                    <button id="tabSIS" class="tab-btn tab-active tab-sis" onclick="switchTab('SIS')">
                        SIS
                    </button>

                    <button id="tabOP" class="tab-btn tab-op" onclick="switchTab('OP')">
                        Operational
                    </button>

                    <button id="tabMSG" class="tab-btn tab-msg" onclick="switchTab('MSG')">
                        Message Only
                    </button>
                </div>

                <!-- SIS PANEL -->
                <div id="sisPanel" class="p-5 overflow-y-auto panel-height">
                    <h3 class="text-lg font-extrabold bg-orange-50 border-l-8 border-orange-500 p-3 rounded-xl">
                        SIS Cause-Effect Blocks
                    </h3>
        `;

        if (sisBlocks.length === 0) {
            html += `<p class="mt-4 text-slate-600 italic">No SIS data found.</p>`;
        } else {
            sisBlocks.forEach(obj => {
                html += `<h4 class="mt-4 text-md font-bold text-blue-700">Sheet: ${obj.sheet}</h4>`;
                obj.blocks.forEach(block => {
                    html += renderLogicBlock(block, blockCounter++);
                });
            });
        }

        html += `
                </div>

                <!-- OP PANEL -->
                <div id="opPanel" class="p-5 overflow-y-auto panel-height hidden">
                    <h3 class="text-lg font-extrabold bg-green-50 border-l-8 border-green-600 p-3 rounded-xl">
                        Operational Cause-Effect Blocks
                    </h3>
        `;

        if (opBlocks.length === 0) {
            html += `<p class="mt-4 text-slate-600 italic">No Operational data found.</p>`;
        } else {
            opBlocks.forEach(obj => {
                html += `<h4 class="mt-4 text-md font-bold text-blue-700">Sheet: ${obj.sheet}</h4>`;
                obj.blocks.forEach(block => {
                    html += renderLogicBlock(block, blockCounter++);
                });
            });
        }

        html += `
                </div>

                <!-- MESSAGE ONLY PANEL -->
                <div id="messagePanel" class="p-5 overflow-y-auto panel-height hidden">
                    <h3 class="text-lg font-extrabold bg-purple-50 border-l-8 border-purple-700 p-3 rounded-xl">
                        Message Only Sheet Data
                    </h3>

                    ${renderMessageOnlyTable(data.message_only || [])}
                </div>

            </div>
        `;

        resultBox.innerHTML = html;

        // default active tab SIS
        switchTab("SIS");

    } catch (err) {
        resultBox.innerHTML = `
            <div class="bg-red-100 border border-red-300 text-red-700 font-bold text-center p-4 rounded-xl">
                Error: ${err}
            </div>
        `;
    }
}

// Enter triggers search
document.getElementById("searchInput").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        searchData();
    }
});
</script>

</body>
</html>
